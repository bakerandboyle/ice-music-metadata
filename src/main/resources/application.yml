spring:
  application:
    name: ice-music-metadata

  # Virtual Threads (Java 25 LTS — pinning-safe with Hibernate)
  threads:
    virtual:
      enabled: true

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ice_music}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # JPA
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Jackson 3 (Spring Boot 4.x)
  # ISO-8601 dates are the default in Jackson 3 — no need to disable WRITE_DATES_AS_TIMESTAMPS
  jackson:
    default-property-inclusion: non_null

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    git:
      mode: full

# Structured JSON logging
logging:
  structured:
    format:
      console: ecs

# Server
server:
  shutdown: graceful
